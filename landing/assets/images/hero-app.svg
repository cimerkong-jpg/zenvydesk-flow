<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EFF6FF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Main window with shadow -->
  <g filter="url(#shadow)">
    <rect x="80" y="60" width="640" height="480" rx="12" fill="white"/>
    <rect x="80" y="60" width="640" height="480" rx="12" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  
  <!-- Window title bar -->
  <rect x="80" y="60" width="640" height="48" rx="12" fill="#F8FAFC"/>
  <rect x="80" y="108" width="640" height="2" fill="#E2E8F0"/>
  
  <!-- Window controls -->
  <circle cx="105" cy="84" r="6" fill="#EF4444"/>
  <circle cx="130" cy="84" r="6" fill="#F59E0B"/>
  <circle cx="155" cy="84" r="6" fill="#10B981"/>
  
  <!-- Window title -->
  <rect x="340" y="76" width="120" height="16" rx="4" fill="#CBD5E1"/>
  
  <!-- Sidebar -->
  <rect x="80" y="108" width="180" height="432" fill="#F8FAFC"/>
  <rect x="260" y="108" width="2" height="432" fill="#E2E8F0"/>
  
  <!-- Sidebar header -->
  <rect x="100" y="130" width="140" height="32" rx="6" fill="#EFF6FF"/>
  <rect x="110" y="138" width="16" height="16" rx="3" fill="#2563EB"/>
  <rect x="135" y="141" width="80" height="10" rx="3" fill="#2563EB"/>
  
  <!-- Sidebar menu items -->
  <rect x="100" y="180" width="140" height="32" rx="6" fill="white"/>
  <rect x="110" y="188" width="16" height="16" rx="3" fill="#CBD5E1"/>
  <rect x="135" y="191" width="70" height="10" rx="3" fill="#94A3B8"/>
  
  <rect x="100" y="220" width="140" height="32" rx="6" fill="white"/>
  <rect x="110" y="228" width="16" height="16" rx="3" fill="#CBD5E1"/>
  <rect x="135" y="231" width="60" height="10" rx="3" fill="#94A3B8"/>
  
  <rect x="100" y="260" width="140" height="32" rx="6" fill="white"/>
  <rect x="110" y="268" width="16" height="16" rx="3" fill="#CBD5E1"/>
  <rect x="135" y="271" width="75" height="10" rx="3" fill="#94A3B8"/>
  
  <rect x="100" y="300" width="140" height="32" rx="6" fill="white"/>
  <rect x="110" y="308" width="16" height="16" rx="3" fill="#CBD5E1"/>
  <rect x="135" y="311" width="65" height="10" rx="3" fill="#94A3B8"/>
  
  <!-- Main content area -->
  <!-- Header bar -->
  <rect x="280" y="130" width="420" height="48" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="300" y="145" width="200" height="18" rx="4" fill="#CBD5E1"/>
  <rect x="630" y="145" width="50" height="18" rx="4" fill="#2563EB"/>
  
  <!-- Content cards -->
  <rect x="280" y="200" width="200" height="140" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="295" y="215" width="170" height="70" rx="6" fill="#EFF6FF"/>
  <circle cx="380" cy="250" r="15" fill="#2563EB" opacity="0.2"/>
  <path d="M380 242v16m-8-8h16" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <rect x="295" y="300" width="140" height="12" rx="4" fill="#CBD5E1"/>
  <rect x="295" y="318" width="100" height="10" rx="3" fill="#E2E8F0"/>
  
  <rect x="500" y="200" width="200" height="140" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="515" y="215" width="170" height="70" rx="6" fill="#EFF6FF"/>
  <circle cx="600" cy="250" r="15" fill="#2563EB" opacity="0.2"/>
  <path d="M592 250l6 6 10-12" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="515" y="300" width="140" height="12" rx="4" fill="#CBD5E1"/>
  <rect x="515" y="318" width="100" height="10" rx="3" fill="#E2E8F0"/>
  
  <!-- Bottom content area -->
  <rect x="280" y="360" width="420" height="160" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="300" y="380" width="380" height="12" rx="4" fill="#CBD5E1"/>
  <rect x="300" y="400" width="280" height="10" rx="3" fill="#E2E8F0"/>
  <rect x="300" y="420" width="320" height="10" rx="3" fill="#E2E8F0"/>
  
  <!-- Data visualization bars -->
  <rect x="300" y="450" width="60" height="50" rx="4" fill="#EFF6FF"/>
  <rect x="300" y="470" width="60" height="30" rx="4" fill="#2563EB"/>
  
  <rect x="375" y="450" width="60" height="50" rx="4" fill="#EFF6FF"/>
  <rect x="375" y="460" width="60" height="40" rx="4" fill="#2563EB"/>
  
  <rect x="450" y="450" width="60" height="50" rx="4" fill="#EFF6FF"/>
  <rect x="450" y="475" width="60" height="25" rx="4" fill="#2563EB"/>
  
  <rect x="525" y="450" width="60" height="50" rx="4" fill="#EFF6FF"/>
  <rect x="525" y="465" width="60" height="35" rx="4" fill="#2563EB"/>
  
  <rect x="600" y="450" width="60" height="50" rx="4" fill="#EFF6FF"/>
  <rect x="600" y="455" width="60" height="45" rx="4" fill="#2563EB"/>
  
  <!-- Floating accent elements -->
  <circle cx="150" cy="480" r="4" fill="#2563EB" opacity="0.3"/>
  <circle cx="650" cy="150" r="6" fill="#2563EB" opacity="0.2"/>
  <circle cx="720" cy="480" r="5" fill="#2563EB" opacity="0.25"/>
</svg>